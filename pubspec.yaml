name: nova_venues_admin
description: "Nova Venues Admin — Mobile command center"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  audioplayers: ^6.5.1  # voicemail playback (no mic dependency)
  mobile_scanner: ^7.0.0  # QR ticket scanning for event door check-in
  flutter_widget_from_html_core: ^0.17.2  # HTML render (no audio/video/webview → no mic requirement)
  fwfh_cached_network_image: ^0.16.1      # inline <img> via cached_network_image (already a dep)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/nova_venue_logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/nova_venue_logo.png
  remove_alpha_ios: true
  background_color_ios: "#000000"

flutter_native_splash:
  color: "#000000"
  image: assets/images/nova_venue_logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#000000"
    image: assets/images/nova_venue_logo.png
